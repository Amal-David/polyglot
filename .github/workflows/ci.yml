name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: ${{ matrix.os }} / Python ${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]
        include:
          - os: macos-latest
            python-version: "3.10"
          - os: macos-latest
            python-version: "3.14"

    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Compile Python sources
        run: python -m compileall -q polyglot scripts tests
      - name: Run unit tests
        run: python -m unittest discover -s tests -v
      - name: Check Pi package metadata
        run: npm pkg get name version pi

  wheel:
    name: Clean wheel and isolated install
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: actions/setup-python@v6
        with:
          python-version: "3.10"
      - name: Build wheel
        run: python -m pip wheel . --no-deps --wheel-dir dist
      - name: Smoke-test isolated install
        run: python scripts/check_wheel_install.py dist/ambient_polyglot-*.whl
      - uses: actions/upload-artifact@v7
        with:
          name: ambient-polyglot-wheel
          path: dist/*.whl
          if-no-files-found: error
